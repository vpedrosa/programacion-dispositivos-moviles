<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home — Panel de Simulación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Smart Home — Simulación Mock</h1>
        <p class="subtitle">Panel de control y comisionamiento de dispositivos</p>
    </header>

    <main>
        <!-- Dispositivos disponibles (no comisionados) -->
        <section class="card">
            <div class="section-header">
                <h2>Dispositivos disponibles</h2>
                <button class="btn-sm" onclick="refreshDiscover()">Actualizar</button>
            </div>
            <div id="discover-grid" class="devices-grid">
                <p class="empty-state">Cargando...</p>
            </div>
        </section>

        <!-- Dispositivos comisionados -->
        <section>
            <h2>Dispositivos comisionados</h2>
            <div id="devices-grid" class="devices-grid">
                <p class="empty-state">Ninguno comisionado aun. Comisiona dispositivos desde la seccion de arriba.</p>
            </div>
        </section>

        <!-- Log de eventos -->
        <section class="card">
            <h2>Log de eventos</h2>
            <div id="event-log" class="event-log">
                <p class="empty-state">Sin eventos</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
