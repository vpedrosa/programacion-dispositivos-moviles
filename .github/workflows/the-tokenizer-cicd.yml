name: 🎮 The Tokenizer CI/CD

on:
  push:
    branches: [master]
    paths: ["the-tokenizer/game/the-tokenizer/**", ".github/workflows/the-tokenizer-cicd.yml"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE: "stable"
  PROJECT_PATH: "the-tokenizer/game/the-tokenizer"

jobs:
  test:
    name: GUT Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /tmp/godot_bin
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-linux

      - name: Download Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O /tmp/godot.zip
          mkdir -p /tmp/godot_bin
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x /tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64

      - name: Install Godot
        run: sudo ln -sf "/tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Import project resources
        # `.godot/` está en .gitignore, así que el runner arranca sin
        # caché. Sin este paso, la primera invocación de Godot no
        # resuelve los class_name globales (PlayerState, EthicalEvent...)
        # ni los preload() de assets, y los autoloads fallan al cargarse.
        # `--import` hace el escaneo y sale por sí solo con exit 0.
        run: |
          cd "$PROJECT_PATH"
          godot --headless --import

      - name: Run GUT suite
        run: |
          cd "$PROJECT_PATH"
          godot --headless -s addons/gut/gut_cmdln.gd -gconfig=.gutconfig.json

  export:
    name: Export APK + Linux
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Android signing)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install system dependencies
        run: sudo apt-get install -y wget unzip

      - name: Cache Godot binaries and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /tmp/godot_bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}

      - name: Download Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O /tmp/godot.zip
          mkdir -p /tmp/godot_bin
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x /tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/templates_unzip
          mv /tmp/templates_unzip/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Install Godot
        run: sudo ln -sf "/tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "build-tools;34.0.0" "platforms;android-34" > /dev/null 2>&1

      - name: Configure Godot editor settings (Android SDK path)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          EOF

      - name: Set up Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
          printf 'keystore/debug="/tmp/release.keystore"\n' >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_password="%s"\n' "$KEYSTORE_PASSWORD" >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_user="%s"\n' "$KEY_ALIAS" >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_key_password="%s"\n' "$KEY_PASSWORD" >> "$PROJECT_PATH/export_presets.cfg"

      - name: Import project resources
        # Mismo motivo que en el job test: sin .godot/ pre-poblado,
        # `--install-android-build-template` arranca el editor, intenta
        # cargar autoloads/main_scene y se cae al no poder resolver UIDs
        # ni class_name. `--import` hace el escaneo y sale por sí solo.
        run: |
          cd "$PROJECT_PATH"
          godot --headless --import

      - name: Install Android build template
        run: |
          # gradle_build/use_gradle_build=true exige el template Gradle
          # copiado dentro de <project>/android/build/. Godot 4 lo instala
          # con esta acción headless que extrae android_source.zip de los
          # export templates al árbol del proyecto. Idempotente.
          mkdir -p "$PROJECT_PATH/android/build"
          cd "$PROJECT_PATH"
          godot --headless --install-android-build-template

      - name: Export Android APK
        run: |
          mkdir -p /tmp/build
          cd "$PROJECT_PATH"
          godot --headless --export-debug "Android" /tmp/build/the-tokenizer.apk

      - name: Export Linux x86_64
        run: |
          cd "$PROJECT_PATH"
          godot --headless --export-debug "Linux" /tmp/build/the-tokenizer.x86_64
          chmod +x /tmp/build/the-tokenizer.x86_64

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: the-tokenizer-android
          path: /tmp/build/the-tokenizer.apk
          if-no-files-found: error

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: the-tokenizer-linux
          path: /tmp/build/the-tokenizer.x86_64
          if-no-files-found: error
