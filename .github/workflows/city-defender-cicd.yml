name: 🎮 City Defender CI/CD

on:
  push:
    branches: [master]
    paths: ["city-defender/game/city-defender/**"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE: "stable"
  PROJECT_PATH: "city-defender/game/city-defender"

jobs:
  export:
    name: Export APK + Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Android signing)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install system dependencies
        run: sudo apt-get install -y wget unzip

      - name: Cache Godot binaries and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /tmp/godot_bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}

      - name: Download Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O /tmp/godot.zip
          mkdir -p /tmp/godot_bin
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          chmod +x /tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64

      - name: Download export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          wget -q "$BASE/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/templates_unzip
          mv /tmp/templates_unzip/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Install Godot
        run: |
          sudo ln -sf "/tmp/godot_bin/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Set up Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "build-tools;34.0.0" "platforms;android-34" > /dev/null 2>&1

      - name: Configure Godot editor settings (Android SDK path)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          EOF

      - name: Create Firebase .env
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIRESTORE_API_KEY: ${{ secrets.FIRESTORE_API_KEY }}
        run: |
          printf 'FIREBASE_PROJECT_ID=%s\nFIREBASE_API_KEY=%s\n' \
            "$FIREBASE_PROJECT_ID" "$FIRESTORE_API_KEY" \
            > "$PROJECT_PATH/.env"

      - name: Set up Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
          # Append keystore settings to the Android export preset options section
          printf 'keystore/debug="/tmp/release.keystore"\n' >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_password="%s"\n' "$KEYSTORE_PASSWORD" >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_user="%s"\n' "$KEY_ALIAS" >> "$PROJECT_PATH/export_presets.cfg"
          printf 'keystore/debug_key_password="%s"\n' "$KEY_PASSWORD" >> "$PROJECT_PATH/export_presets.cfg"

      - name: Export Android APK
        run: |
          mkdir -p /tmp/build
          cd "$PROJECT_PATH"
          godot --headless --export-debug "Android" /tmp/build/city-defender.apk

      - name: Export Linux x86_64
        run: |
          cd "$PROJECT_PATH"
          godot --headless --export-debug "Linux" /tmp/build/city-defender.x86_64
          chmod +x /tmp/build/city-defender.x86_64

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: city-defender-android
          path: /tmp/build/city-defender.apk
          if-no-files-found: error

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: city-defender-linux
          path: /tmp/build/city-defender.x86_64
          if-no-files-found: error
