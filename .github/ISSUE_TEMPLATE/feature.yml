name: Nueva funcionalidad
description: Solicitar una nueva funcionalidad o mejora.
labels: ["feature"]
body:
  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      description: Explicación de lo que se necesita implementar, corregir o modificar.
      placeholder: Describe la funcionalidad o cambio necesario...
    validations:
      required: true
  - type: textarea
    id: criterios
    attributes:
      label: Criterios de aceptación
      description: Lista de criterios que deben cumplirse para dar por completada la issue.
      value: |
        - [ ] Criterio 1
        - [ ] Criterio 2
        - [ ] Criterio 3
    validations:
      required: true
  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: "Cualquier información relevante: capturas de pantalla, logs, enlaces a documentación, etc."
    validations:
      required: false
